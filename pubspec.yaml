name: smart_lab
description: "Skillify — Master Skills with AI: An interactive virtual laboratory for high school students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.2

  # AI Integration
  google_generative_ai: ^0.4.7

  # 3D Model Rendering
  model_viewer_plus: ^1.8.1

  # Security
  flutter_dotenv: ^6.0.0

  # Hugging Face Image Generation
  http: ^1.2.1
  path_provider: ^2.1.3
  crypto: ^3.0.3

  # Local persistence for user progress
  shared_preferences: ^2.2.3

  # Charts for dashboard analytics
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/models/
    - assets/images/